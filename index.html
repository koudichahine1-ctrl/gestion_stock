<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Stock Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h2>Stock<span>Master</span></h2>
            <p class="role">Junior Front-End Dev</p>
        </aside>

        <main class="main-content">
            
            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Total Produits</h3>
                    <p id="stat-total-products">0</p>
                </div>
                <div class="stat-card">
                    <h3>Valeur Totale</h3>
                    <p id="stat-total-value">0.00 DT</p>
                </div>
                <div class="stat-card alert">
                    <h3>Alerte Stock Bas (&lt; 5)</h3>
                    <p id="stat-low-stock">0</p>
                </div>
            </section>

            <section class="controls-section">
                <input type="text" id="search-input" placeholder="Rechercher un produit...">
                <select id="filter-category">
                    <option value="all">Toutes les catégories</option>
                    <option value="Électronique">Électronique</option>
                    <option value="Vêtements">Vêtements</option>
                    <option value="Alimentation">Alimentation</option>
                </select>
                <button id="btn-open-modal" class="btn-primary">+ Ajouter un Produit</button>
            </section>

            <section class="table-section">
                <table class="stock-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Catégorie</th>
                            <th>Prix (DT)</th>
                            <th>Quantité</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body">
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Ajouter un Produit</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                
                <div class="form-group">
                    <label for="product-name">Nom du produit</label>
                    <input type="text" id="product-name" required>
                </div>

                <div class="form-group">
                    <label for="product-category">Catégorie</label>
                    <select id="product-category" required>
                        <option value="Électronique">Électronique</option>
                        <option value="Vêtements">Vêtements</option>
                        <option value="Alimentation">Alimentation</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="product-price">Prix (DT)</label>
                    <input type="number" id="product-price" step="0.001" min="0" required>
                </div>

                <div class="form-group">
                    <label for="product-quantity">Quantité</label>
                    <input type="number" id="product-quantity" min="0" required>
                </div>

                <button type="submit" class="btn-primary-block">Enregistrer</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
